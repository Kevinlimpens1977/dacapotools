version: '3.8'

services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: dacapotools
    restart: unless-stopped
    networks:
      - traefik_proxy
    environment:
      - NODE_ENV=production
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_USER=kevin
      - DB_PASS=20Dacapo25!!
      - DB_NAME=dacapo_apps
      - ADMIN_SECRET=kevinmaaktalles
      - TOKEN_EXPIRES=2h
      - FRONTEND_ORIGIN=https://www.dacapotools.nl
      - API_URL=https://www.dacapotools.nl
    volumes:
      - ./uploads:/app/uploads
    labels:
      # Enable Traefik
      - "traefik.enable=true"
      
      # HTTP Router
      - "traefik.http.routers.dacapo.rule=Host(`www.dacapotools.nl`)"
      - "traefik.http.routers.dacapo.entrypoints=websecure"
      - "traefik.http.routers.dacapo.tls=true"
      - "traefik.http.routers.dacapo.tls.certresolver=letsencrypt"
      
      # Service
      - "traefik.http.services.dacapo.loadbalancer.server.port=3000"
      
      # Middleware (optioneel - compress responses)
      - "traefik.http.routers.dacapo.middlewares=compress"
      - "traefik.http.middlewares.compress.compress=true"
      
      # Security Headers
      - "traefik.http.middlewares.dacapo-headers.headers.sslredirect=true"
      - "traefik.http.middlewares.dacapo-headers.headers.stsSeconds=31536000"
      - "traefik.http.middlewares.dacapo-headers.headers.stsIncludeSubdomains=true"
      - "traefik.http.middlewares.dacapo-headers.headers.stsPreload=true"
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/api/health', (r) => {process.exit(r.statusCode === 200 ? 0 : 1)})"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

networks:
  traefik_proxy:
    external: true
